<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多学科学习助手</title>
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📚 多学科学习助手</h1>
            <p class="subtitle">基于 RAG 的智能学习平台</p>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <!-- API Key Section -->
                <div class="section">
                    <h3>🔑 API 密钥</h3>
                    <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key">
                    <button id="saveApiKeyBtn" class="btn btn-primary">保存密钥</button>
                    <div id="apiKeyStatus" class="status-text"></div>
                </div>

                <!-- Assistant Selector -->
                <div class="section" id="assistantSelectorSection" style="display: none;">
                    <h3>🎯 当前助手</h3>
                    <div id="currentAssistant" class="current-assistant"></div>
                    <button id="changeAssistantBtn" class="btn btn-secondary">切换助手</button>
                </div>

                <!-- File Upload -->
                <div class="section" id="uploadSection" style="display: none;">
                    <h3>📤 上传资料</h3>
                    <input type="file" id="fileInput" accept=".cpp,.h,.txt,.md,.pdf,.docx">
                    <button id="uploadBtn" class="btn btn-primary">上传文件</button>
                    <div id="uploadStatus" class="status-text"></div>
                </div>

                <!-- Knowledge Base Stats -->
                <div class="section" id="statsSection" style="display: none;">
                    <h3>📊 知识库统计</h3>
                    <div id="kbStats" class="stats-display"></div>
                    <button id="refreshStatsBtn" class="btn btn-secondary">刷新</button>
                </div>

                <!-- Actions -->
                <div class="section" id="actionsSection" style="display: none;">
                    <h3>⚙️ 操作</h3>
                    <button id="clearHistoryBtn" class="btn btn-warning">清空对话</button>
                    <button id="clearKbBtn" class="btn btn-danger">清空知识库</button>
                    <button id="generateQuizBtn" class="btn btn-success">生成测验</button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="content">
                <!-- Assistant Selection View -->
                <div id="assistantSelectionView" class="view active">
                    <div class="view-header">
                        <h2>选择学习助手</h2>
                        <button id="createAssistantBtn" class="btn-icon" title="创建新助手">+</button>
                    </div>
                    <div id="assistantCards" class="assistant-cards"></div>
                </div>

                <!-- Chat View -->
                <div id="chatView" class="view">
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="chat-input-container">
                        <textarea id="chatInput" placeholder="输入你的问题..." rows="3"></textarea>
                        <button id="sendBtn" class="btn btn-primary">发送</button>
                    </div>
                </div>

                <!-- Quiz View -->
                <div id="quizView" class="view">
                    <div id="quizContainer"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Create Assistant Modal -->
    <div id="createAssistantModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>创建新助手</h3>
            <label class="modal-label">名称</label>
            <input type="text" id="newAssistantName" placeholder="例如：高等数学" maxlength="30">
            <label class="modal-label">描述</label>
            <textarea id="newAssistantDesc" placeholder="简要描述该助手的教学范围和定位" rows="3" maxlength="200"></textarea>
            <div class="modal-actions">
                <button id="cancelCreateBtn" class="btn btn-secondary">取消</button>
                <button id="confirmCreateBtn" class="btn btn-primary">创建</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js?v=2"></script>
    <script src="js/chat.js?v=2"></script>
    <script src="js/quiz.js?v=2"></script>
    <script src="js/upload.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>
</html>
